<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Interactive dashboard for AI coding agent usage analytics.">
<title>Agent Usage Atlas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%234f46e5'/><stop offset='100%25' stop-color='%2306b6d4'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700'>A</text><circle cx='76' cy='26' r='10' fill='%23fbbf24'/></svg>">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css" integrity="sha384-nRgPTkuX86pH8yjPJUAFuASXQSSl2/bBUiNV47vSYpKFxHJhbcrGnmlYpYJMeD7a" crossorigin="anonymous" media="print" onload="this.media='all'">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js" integrity="sha384-pPi0zxBAoDu6+JXW/C68UZLvBUUtU+7zonhif43rqj7pxsGyqyqzcian2Rj37Rss" crossorigin="anonymous"></script>
<style>
__CSS__
</style>
<style media="print">
.quick-nav,.back-top,.loading-screen,.skip-link,.toast,#toast-container,
.show-more-btn,.divider .chevron,.range-tabs,.burn-tabs,.lang-btn,.theme-btn,kbd{display:none !important}
body{background:#fff !important;color:#000 !important}
.page{max-width:100%;padding:10px}
.p,.src,.cc,.sc{box-shadow:none;border:1px solid #ddd;break-inside:avoid}
.hero-wrap{backdrop-filter:none}
.hero-wrap::before{display:none}
h1{-webkit-text-fill-color:#000;background:none !important;animation:none !important}
.chart{break-inside:avoid;page-break-inside:avoid}
.section-wrap.collapsed{max-height:none !important;opacity:1 !important;overflow:visible !important;pointer-events:auto !important}
.section-more{max-height:none !important;opacity:1 !important;overflow:visible !important}
*{animation:none !important;transition:none !important}
</style>
</head>
<body>
<a href="#hero-title" class="skip-link" style="position:absolute;top:-40px;left:0;background:var(--accent);color:#000;padding:8px 16px;z-index:10000;transition:top 0.2s;font-weight:600;text-decoration:none"
   onfocus="this.style.top='0'" onblur="this.style.top='-40px'">Skip to content</a>
<div id="loading-screen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg,#0d1016);z-index:9998">
  <div style="text-align:center;color:var(--text-muted,#666)">
    <div style="width:40px;height:40px;border:3px solid var(--border,#333);border-top-color:var(--accent,#f0b866);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div>
    <div style="font-size:14px">Loading dashboard...</div>
  </div>
</div>
<noscript><div style="padding:40px;text-align:center;font-size:16px">This dashboard requires JavaScript to render.</div></noscript>
<div id="toast-container" style="position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:380px;width:100%;"></div>
<main class="page">
  <section class="g g-wide">
    <article class="p hero-wrap">
      <div class="eyebrow"><i class="fa-solid fa-chart-line"></i> Agent Usage Atlas<span class="live-badge off" id="live-badge"><span class="dot"></span>Static</span><button class="lang-btn" id="lang-btn" onclick="toggleLang()" aria-label="Toggle language">&#127760; ZH</button><button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme"><i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i></button><kbd style="font-size:10px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);margin-left:8px">&#8984;K</kbd></div>
      <div class="range-tabs" id="range-tabs"></div>
      <h1 id="hero-title">Agent Usage Atlas</h1>
      <p class="hero-copy" id="hero-copy"></p>
      <div class="chips" id="hero-chips"></div>
      <div class="hero-stats" id="hero-stats"></div>
      <div class="source-bar-wrap" id="source-bar"></div>
    </article>
    <aside class="side" id="summary-side"></aside>
  </section>

  <button class="divider" type="button" id="sec-sources" aria-expanded="true" aria-controls="wrap-sec-sources"><i class="fa-solid fa-layer-group"></i> <span data-i18n="divSources"></span><i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i></button>
  <div class="section-wrap" id="wrap-sec-sources" data-section="sec-sources" role="region" aria-labelledby="sec-sources">
  <section class="g g3" id="source-cards"></section>
  </div>

  <!-- ═══ Cost & Tokens (merged) ═══ -->
  <button class="divider" type="button" id="sec-cost-tokens" aria-expanded="true" aria-controls="wrap-sec-cost-tokens"><i class="fa-solid fa-dollar-sign"></i> <span data-i18n="divCostTokens"></span><i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i></button>
  <div class="section-wrap" id="wrap-sec-cost-tokens" data-section="sec-cost-tokens" role="region" aria-labelledby="sec-cost-tokens">
  <!-- Token Burn Curve — full-width hero chart with interval tabs -->
  <article class="p burn-hero">
    <div class="sh"><h2 data-i18n="chartTokenBurn"></h2><span data-i18n="chartTokenBurnSub"></span><div class="burn-tabs" id="burn-interval-tabs"></div></div>
    <div class="chart burn-chart" id="token-burn-curve"></div>
  </article>
  <section class="g g4 mt" id="cost-cards"></section>
  <section class="g g-wide mt">
    <article class="p"><div class="sh"><h2 data-i18n="chartDailyCost"></h2><span data-i18n="chartDailyCostSub"></span></div><div class="chart tall" id="daily-cost-chart"></div></article>
    <article class="p"><div class="sh"><h2 data-i18n="chartCostBreakdown"></h2><span data-i18n="chartCostBreakdownSub"></span></div><div class="chart tall" id="cost-breakdown-chart"></div></article>
  </section>
  <section class="g g-wide mt">
    <article class="p">
      <div class="sh"><h2 data-i18n="chartDailyToken"></h2><span data-i18n="chartDailyTokenSub"></span></div>
      <div class="chart tall" id="daily-token-chart"></div>
      <div class="legend" id="token-legend"></div>
    </article>
    <article class="p"><div class="sh"><h2 data-i18n="chartDailyCostType"></h2><span data-i18n="chartDailyCostTypeSub"></span></div><div class="chart tall" id="daily-cost-type-chart"></div></article>
  </section>
  <section class="g g2 mt">
    <article class="p"><div class="sh"><h2 data-i18n="chartCostCalendar"></h2><span data-i18n="chartCostCalendarSub"></span></div><div class="chart sm" id="cost-calendar-chart"></div></article>
    <article class="p"><div class="sh"><h2 data-i18n="chartTokenCalendar"></h2><span data-i18n="chartTokenCalendarSub"></span></div><div class="chart sm" id="token-calendar-chart"></div></article>
  </section>
  <div class="section-more" id="more-cost-tokens">
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartModelCost"></h2><span data-i18n="chartModelCostSub"></span></div><div class="chart sm" id="model-cost-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartCostSankey"></h2><span data-i18n="chartCostSankeySub"></span></div><div class="chart sm" id="cost-sankey-chart"></div></article>
    </section>
    <section class="g g-story mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartStory"></h2><span data-i18n="chartStorySub"></span></div><div class="story" id="story-list"></div></article>
      <div class="stack">
        <article class="p"><div class="sh"><h2 data-i18n="chartRose"></h2><span data-i18n="chartRoseSub"></span></div><div class="chart short" id="rose-chart"></div></article>
        <article class="p">
          <div class="sh"><h2 data-i18n="chartGauge"></h2><span data-i18n="chartGaugeSub"></span></div>
          <div class="gauge-row">
            <div class="chart gauge-item" id="cache-gauge"></div>
            <div class="chart gauge-item" id="reason-gauge"></div>
            <div class="chart gauge-item" id="savings-gauge"></div>
          </div>
        </article>
      </div>
    </section>
    <section class="g g-wide mt">
      <article class="p">
        <div class="sh"><h2 data-i18n="chartTokenSankey"></h2><span data-i18n="chartTokenSankeySub"></span></div>
        <div class="chart tall" id="token-sankey-chart"></div>
        <div class="nl" id="source-notes"></div>
      </article>
    </section>
  </div>
  <button class="show-more-btn" type="button" data-more="more-cost-tokens" aria-expanded="false"><span data-i18n="showMore"></span> <span class="show-more-count">6</span> <i class="fa-solid fa-chevron-down chevron-more" aria-hidden="true"></i></button>
  </div>

  <!-- ═══ Activity & Sessions (merged) ═══ -->
  <button class="divider" type="button" id="sec-activity" aria-expanded="true" aria-controls="wrap-sec-activity"><i class="fa-solid fa-clock"></i> <span data-i18n="divActivitySessions"></span><i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i></button>
  <div class="section-wrap" id="wrap-sec-activity" data-section="sec-activity" role="region" aria-labelledby="sec-activity">
  <section class="g g2">
    <article class="p"><div class="sh"><h2 data-i18n="chartHeatmap"></h2><span data-i18n="chartHeatmapSub"></span></div><div class="chart tall" id="heatmap-chart"></div></article>
    <article class="p"><div class="sh"><h2 data-i18n="chartSourceRadar"></h2><span data-i18n="chartSourceRadarSub"></span></div><div class="chart tall" id="source-radar-chart"></div></article>
  </section>
  <div class="section-more" id="more-activity">
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartTimeline"></h2><span data-i18n="chartTimelineSub"></span></div><div class="chart sm" id="timeline-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartBubble"></h2><span data-i18n="chartBubbleSub"></span></div><div class="chart sm" id="bubble-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartTempo"></h2><span data-i18n="chartTempoSub"></span></div><div class="chart sm" id="tempo-chart"></div><div class="nl" id="tempo-notes"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartSessionDur"></h2><span data-i18n="chartSessionDurSub"></span></div><div class="chart sm" id="session-duration-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartModelRadar"></h2><span data-i18n="chartModelRadarSub"></span></div><div class="chart sm" id="model-radar-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartTurnDur"></h2><span data-i18n="chartTurnDurSub"></span></div><div class="chart sm" id="turn-dur-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartDailyTurnDur"></h2><span data-i18n="chartDailyTurnDurSub"></span></div><div class="chart sm" id="daily-turn-dur-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartTaskRate"></h2><span data-i18n="chartTaskRateSub"></span></div><div class="chart sm" id="task-rate-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartCodegenModel"></h2><span data-i18n="chartCodegenModelSub"></span></div><div class="chart sm" id="codegen-model-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartCodegenDaily"></h2><span data-i18n="chartCodegenDailySub"></span></div><div class="chart sm" id="codegen-daily-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartAiContrib"></h2><span data-i18n="chartAiContribSub"></span></div><div class="chart sm" id="ai-contribution-chart"></div></article>
    </section>
  </div>
  <button class="show-more-btn" type="button" data-more="more-activity" aria-expanded="false"><span data-i18n="showMore"></span> <span class="show-more-count">11</span> <i class="fa-solid fa-chevron-down chevron-more" aria-hidden="true"></i></button>
  </div>

  <!-- ═══ Tooling & Projects (merged) ═══ -->
  <button class="divider" type="button" id="sec-tooling" aria-expanded="true" aria-controls="wrap-sec-tooling"><i class="fa-solid fa-wrench"></i> <span data-i18n="divToolingProjects"></span><i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i></button>
  <div class="section-wrap" id="wrap-sec-tooling" data-section="sec-tooling" role="region" aria-labelledby="sec-tooling">
  <section class="g g2">
    <article class="p"><div class="sh"><h2 data-i18n="chartToolRank"></h2><span data-i18n="chartToolRankSub"></span></div><div class="chart sm" id="tool-ranking-chart"></div></article>
    <article class="p"><div class="sh"><h2 data-i18n="chartProjectRank"></h2><span data-i18n="chartProjectRankSub"></span></div><div class="chart sm" id="project-ranking-chart"></div></article>
  </section>
  <div class="section-more" id="more-tooling">
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartToolDensity"></h2><span data-i18n="chartToolDensitySub"></span></div><div class="chart sm" id="tool-density-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartToolBigram"></h2><span data-i18n="chartToolBigramSub"></span></div><div class="chart sm" id="tool-bigram-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartTopCmd"></h2><span data-i18n="chartTopCmdSub"></span></div><div class="chart sm" id="top-commands-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartCmdSuccess"></h2><span data-i18n="chartCmdSuccessSub"></span></div><div class="chart sm" id="command-success-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartEfficiency"></h2><span data-i18n="chartEfficiencySub"></span></div><div class="chart sm" id="efficiency-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartFileTypes"></h2><span data-i18n="chartFileTypesSub"></span></div><div class="chart sm" id="file-types-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartBranch"></h2><span data-i18n="chartBranchSub"></span></div><div class="chart sm" id="branch-activity-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartProductivity"></h2><span data-i18n="chartProductivitySub"></span></div><div class="chart sm" id="productivity-chart"></div></article>
    </section>
    <section class="g g2 mt">
      <article class="p"><div class="sh"><h2 data-i18n="chartBurnRate"></h2><span data-i18n="chartBurnRateSub"></span></div><div class="chart sm" id="burn-rate-chart"></div></article>
      <article class="p"><div class="sh"><h2 data-i18n="chartCostPerTool"></h2><span data-i18n="chartCostPerToolSub"></span></div><div class="chart sm" id="cost-per-tool-chart"></div></article>
    </section>
  </div>
  <button class="show-more-btn" type="button" data-more="more-tooling" aria-expanded="false"><span data-i18n="showMore"></span> <span class="show-more-count">10</span> <i class="fa-solid fa-chevron-down chevron-more" aria-hidden="true"></i></button>
  </div>

  <!-- ═══ Insights (default collapsed) ═══ -->
  <button class="divider" type="button" id="sec-insights" aria-expanded="true" aria-controls="wrap-sec-insights"><i class="fa-solid fa-lightbulb"></i> <span data-i18n="divInsights"></span><i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i></button>
  <div class="section-wrap" id="wrap-sec-insights" data-section="sec-insights" role="region" aria-labelledby="sec-insights">
  <section class="g g4" id="vague-stats"></section>
  <section class="g g-wide mt">
    <article class="p">
      <div class="sh"><h2 data-i18n="chartVagueList"></h2><span data-i18n="chartVagueListSub"></span></div>
      <div class="vague-list" id="vague-list"></div>
    </article>
    <article class="p">
      <div class="sh"><h2 data-i18n="chartExpensive"></h2><span data-i18n="chartExpensiveSub"></span></div>
      <div class="table-wrap"><table id="expensive-table"></table></div>
    </article>
  </section>
  <section class="mt" id="insight-cards"></section>
  </div>

  <!-- ═══ Leaderboard (default collapsed) ═══ -->
  <button class="divider" type="button" id="sec-leaderboard" aria-expanded="true" aria-controls="wrap-sec-leaderboard"><i class="fa-solid fa-list-ol"></i> <span data-i18n="divLeaderboard"></span><i class="fa-solid fa-chevron-down chevron" aria-hidden="true"></i></button>
  <div class="section-wrap" id="wrap-sec-leaderboard" data-section="sec-leaderboard" role="region" aria-labelledby="sec-leaderboard">
  <section>
    <article class="p">
      <div class="table-wrap"><table id="session-table"></table></div>
      <div class="footer" id="footer-text"></div>
    </article>
  </section>
  </div>

  <nav class="quick-nav" id="quick-nav" aria-label="Section navigation">
    <a href="#sec-sources"><i class="fa-solid fa-layer-group"></i><span data-i18n="navSources">Sources</span></a>
    <a href="#sec-cost-tokens"><i class="fa-solid fa-dollar-sign"></i><span data-i18n="navCostTokens">Cost</span></a>
    <a href="#sec-activity"><i class="fa-solid fa-clock"></i><span data-i18n="navActivity">Activity</span></a>
    <a href="#sec-tooling"><i class="fa-solid fa-wrench"></i><span data-i18n="navTooling">Tooling</span></a>
    <a href="#sec-insights"><i class="fa-solid fa-lightbulb"></i><span data-i18n="navInsights">Insights</span></a>
    <a href="#sec-leaderboard"><i class="fa-solid fa-list-ol"></i><span data-i18n="navLeaderboard">Board</span></a>
  </nav>
  <button class="back-top" id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top"><i class="fa-solid fa-arrow-up" aria-hidden="true"></i></button>
</main>

<script>
__JS__
</script>
</body>
</html>
